<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <style>
    body {
      width: 300px;
      padding: 16px;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      font-size: 14px;
    }

    h1 {
      font-size: 16px;
      margin: 0 0 12px 0;
      color: #333;
    }

    .status {
      padding: 8px 12px;
      border-radius: 6px;
      margin-bottom: 12px;
      font-weight: 500;
    }

    .status.attached {
      background: #E8F5E9;
      color: #2E7D32;
    }

    .status.detached {
      background: #FFF3E0;
      color: #E65100;
    }

    .tab-info {
      background: #F5F5F5;
      padding: 8px 12px;
      border-radius: 6px;
      margin-bottom: 12px;
      font-size: 12px;
      word-break: break-all;
    }

    .tab-info strong {
      display: block;
      margin-bottom: 4px;
    }

    button {
      width: 100%;
      padding: 10px 16px;
      border: none;
      border-radius: 6px;
      font-size: 14px;
      font-weight: 500;
      cursor: pointer;
      transition: background 0.2s;
    }

    button.attach {
      background: #4CAF50;
      color: white;
    }

    button.attach:hover {
      background: #43A047;
    }

    button.detach {
      background: #F44336;
      color: white;
    }

    button.detach:hover {
      background: #E53935;
    }

    .info {
      margin-top: 12px;
      font-size: 11px;
      color: #666;
      line-height: 1.4;
    }

    .relay-info {
      margin-top: 12px;
      padding: 8px 12px;
      background: #E3F2FD;
      border-radius: 6px;
      font-size: 12px;
    }

    .relay-info code {
      background: #BBDEFB;
      padding: 2px 4px;
      border-radius: 3px;
      font-family: monospace;
    }
  </style>
</head>
<body>
  <h1>🔌 Browser Relay</h1>

  <div id="status" class="status detached">
    Checking...
  </div>

  <div id="tabInfo" class="tab-info">
    <strong>Current Tab:</strong>
    <span id="tabUrl">Loading...</span>
  </div>

  <button id="toggleBtn" class="attach">
    Attach to Tab
  </button>

  <div class="relay-info">
    <strong>Relay Server:</strong><br>
    <code>http://127.0.0.1:18800</code>
  </div>

  <div class="info">
    Click to attach/detach. When attached, Claude Code can control this tab via the relay server.
  </div>

  <script src="popup.js"></script>
</body>
</html>
