<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <title>Browser Relay Settings</title>
  <style>
    body { font-family: -apple-system, BlinkMacSystemFont, sans-serif; max-width: 400px; margin: 20px auto; padding: 0 16px; color: #333; }
    h2 { margin-bottom: 16px; font-size: 18px; }
    label { display: block; margin-top: 12px; font-size: 13px; font-weight: 600; color: #555; }
    input { width: 100%; padding: 8px; margin-top: 4px; border: 1px solid #ccc; border-radius: 4px; font-size: 14px; box-sizing: border-box; }
    input:focus { outline: none; border-color: #4a90d9; box-shadow: 0 0 0 2px rgba(74,144,217,0.2); }
    button { margin-top: 16px; padding: 8px 20px; background: #4a90d9; color: white; border: none; border-radius: 4px; font-size: 14px; cursor: pointer; }
    button:hover { background: #357abd; }
    .status { margin-top: 16px; padding: 10px; border-radius: 4px; font-size: 13px; }
    .status.connected { background: #e6f4ea; color: #137333; }
    .status.disconnected { background: #fce8e6; color: #c5221f; }
    .status.saved { background: #e8f0fe; color: #1967d2; }
    .hint { font-size: 11px; color: #888; margin-top: 2px; }
  </style>
</head>
<body>
  <h2>Browser Relay Settings</h2>

  <label for="serverUrl">Server URL</label>
  <input type="text" id="serverUrl" placeholder="ws://127.0.0.1:18800">
  <div class="hint">Use wss:// for remote servers behind Cloudflare Tunnel</div>

  <label for="userId">User ID</label>
  <input type="text" id="userId" placeholder="your_user_id">
  <div class="hint">Assigned by your admin</div>

  <label for="token">Auth Token</label>
  <input type="password" id="token" placeholder="your_auth_token">
  <div class="hint">Assigned by your admin</div>

  <button id="save">Save & Reconnect</button>

  <div id="status" class="status disconnected">Checking connection...</div>

  <script src="options.js"></script>
</body>
</html>
